name: Release & Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      base_api_url:
        description: 'Base API URL (overrides BASE_API_URL secret)'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      - name: Set scoped package name from repo
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          npm pkg set "name=@${OWNER}/${REPO}"
          echo "Publishing as @${OWNER}/${REPO}"

      - name: Set version from release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          npm version "$VERSION" --no-git-tag-version
          echo "Version: $VERSION"

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          # Extract pre-release identifier (e.g., "beta" from "1.0.0-beta.1")
          if [[ "$VERSION" =~ -([a-zA-Z]+) ]]; then
            echo "tag=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Dist-tag: $(grep tag "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Create .env from secrets
        run: |
          URL="${{ inputs.base_api_url || secrets.BASE_API_URL }}"
          if [ -n "$URL" ]; then
            echo "PUBLIC_BASE_API_URL=$URL" > .env
          else
            touch .env
          fi

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate code
        run: npm run generate

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to GitHub Packages
        run: npm publish --tag ${{ steps.dist-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
